<!DOCTYPE html>
<html class="dark" lang="en" style="background:#06040f">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Chat - SkillSwap</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="webgl_bg.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "rgba(15, 12, 22, 0.5)",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#c7c4d8",
                        "tertiary-container": "#008645",
                        "on-secondary-fixed-variant": "#004e5b",
                        "on-tertiary-container": "#f6fff4",
                        "outline": "#777587",
                        "tertiary": "#006a35",
                        "background": "transparent",
                        "primary": "#675df9",
                        "secondary-container": "#004e5b",
                        "surface-container-high": "rgba(45, 38, 65, 0.45)",
                        "secondary": "#58d6f1",
                        "secondary-fixed": "#a7edff",
                        "on-surface": "#f3effc",
                        "on-secondary-container": "#ffffff",
                        "on-background": "#f3effc",
                        "on-tertiary-fixed-variant": "#005228",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#100069",
                        "surface-container-highest": "rgba(60, 52, 85, 0.5)",
                        "surface-tint": "#4f44e2",
                        "inverse-surface": "#302f39",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#001f25",
                        "surface": "rgba(24, 20, 36, 0.45)",
                        "on-primary-container": "#fffbff",
                        "tertiary-fixed": "#6bfe9c",
                        "surface-variant": "rgba(40, 35, 60, 0.45)",
                        "on-tertiary-fixed": "#00210c",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "rgba(20, 16, 30, 0.3)",
                        "inverse-primary": "#c4c0ff",
                        "inverse-on-surface": "#f3effc",
                        "surface-bright": "rgba(50, 42, 75, 0.4)",
                        "surface-container-lowest": "rgba(10, 8, 15, 0.25)",
                        "error-container": "#ffdad6",
                        "surface-container": "rgba(30, 25, 45, 0.4)",
                        "on-primary-fixed-variant": "#3622ca",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#c4c0ff",
                        "tertiary-fixed-dim": "#4ae183",
                        "error": "#ba1a1a",
                        "primary-fixed": "#e3dfff",
                        "secondary-fixed-dim": "#58d6f1",
                        "primary-container": "#675df9",
                        "outline-variant": "rgba(255, 255, 255, 0.1)"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "64px",
                        "xs": "4px",
                        "sm": "12px",
                        "gutter": "24px",
                        "lg": "40px",
                        "md": "24px",
                        "container-max": "1280px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "title-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "badge-text": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "badge-text": ["13px", { "lineHeight": "16px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-primary {
            background: linear-gradient(135deg, #675df9 0%, #58d6f1 100%);
        }
        .glass-card {
            background: rgba(24, 20, 36, 0.45);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .message-bubble {
            word-wrap: break-word;
            max-width: 80%;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md h-screen flex flex-col overflow-hidden" style="background: transparent;">
    <!-- TopNavBar (Minimal for Chat) -->
    <nav class="bg-surface-container-high/90 backdrop-blur-md text-primary dark:text-inverse-primary docked full-width top-0 z-50 border-b border-outline-variant">
        <div class="flex justify-between items-center w-full px-gutter h-16 max-w-container-max mx-auto">
            <div class="flex items-center gap-md">
                <button onclick="window.history.back()" class="p-2 text-on-surface-variant hover:bg-primary-container/20 transition-all duration-200 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
                </button>
                <div class="flex items-center gap-sm">
                    <div class="w-10 h-10 rounded-full overflow-hidden bg-surface-variant flex items-center justify-center border border-outline-variant relative">
                        <img id="chat-partner-avatar" class="w-full h-full object-cover hidden" alt="Partner Avatar"/>
                        <span id="chat-partner-initials" class="font-bold text-sm text-on-surface-variant"></span>
                        <div id="chat-online-indicator" class="absolute bottom-0 right-0 w-3 h-3 bg-error rounded-full border-2 border-surface-container-high transition-colors"></div>
                    </div>
                    <div>
                        <div id="chat-partner-name" class="font-title-md text-title-md text-on-surface font-bold leading-tight">Loading...</div>
                        <div id="chat-partner-status" class="font-label-caps text-label-caps text-on-surface-variant text-[10px]">Connecting...</div>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-sm">
                <button class="p-2 text-on-surface-variant hover:bg-primary-container/20 transition-all duration-200 rounded-full">
                    <span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col max-w-4xl mx-auto w-full relative overflow-hidden bg-surface-container-lowest/50 backdrop-blur-sm border-x border-outline-variant shadow-lg">
        
        <!-- Messages List -->
        <div id="messages-list" class="flex-1 overflow-y-auto p-md flex flex-col gap-sm hide-scrollbar pb-24">
            <div class="flex flex-col items-center justify-center h-full text-on-surface-variant opacity-50" id="chat-empty-state">
                <span class="material-symbols-outlined text-4xl mb-2">forum</span>
                <p>No messages yet. Say hi!</p>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="absolute bottom-[80px] left-md bg-surface-container-high px-3 py-1.5 rounded-full text-on-surface-variant text-sm flex items-center gap-2 opacity-0 transition-opacity duration-300 pointer-events-none">
            <span id="typing-user-name" class="font-bold text-xs">Someone</span> is typing
            <div class="flex gap-1">
                <span class="w-1.5 h-1.5 bg-on-surface-variant rounded-full animate-bounce" style="animation-delay: 0s;"></span>
                <span class="w-1.5 h-1.5 bg-on-surface-variant rounded-full animate-bounce" style="animation-delay: 0.2s;"></span>
                <span class="w-1.5 h-1.5 bg-on-surface-variant rounded-full animate-bounce" style="animation-delay: 0.4s;"></span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 right-0 bg-surface-container-high/90 backdrop-blur-md border-t border-outline-variant p-sm">
            <form id="chat-form" class="flex items-end gap-sm max-w-container-max mx-auto">
                <button type="button" class="p-2.5 text-on-surface-variant hover:text-primary transition-colors flex-shrink-0">
                    <span class="material-symbols-outlined">attach_file</span>
                </button>
                <div class="flex-1 bg-surface-container-lowest rounded-2xl border border-outline-variant focus-within:border-primary transition-colors flex items-end min-h-[44px]">
                    <textarea id="message-input" rows="1" class="w-full bg-transparent border-none text-on-surface placeholder-on-surface-variant focus:ring-0 resize-none py-2.5 px-4 max-h-[120px] hide-scrollbar" placeholder="Type a message..."></textarea>
                </div>
                <button type="submit" id="send-btn" class="w-11 h-11 rounded-full gradient-primary text-white flex items-center justify-center flex-shrink-0 hover:shadow-lg hover:scale-105 transition-all disabled:opacity-50 disabled:pointer-events-none" disabled>
                    <span class="material-symbols-outlined text-[20px] ml-1">send</span>
                </button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { initializeFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, set, onValue, push, onDisconnect, serverTimestamp, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKoESaSoGW6YsNbrWZK9cJkZEmwzst4EU",
            authDomain: "skill-swap-13607.firebaseapp.com",
            projectId: "skill-swap-13607",
            storageBucket: "skill-swap-13607.firebasestorage.app",
            messagingSenderId: "1084945079828",
            appId: "1:1084945079828:web:2e4f6804050cd2c6a19101",
            databaseURL: "https://skill-swap-13607-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const firestore = initializeFirestore(app, { experimentalForceLongPolling: true });
        const rtdb = getDatabase(app);

        // UI Elements
        const messagesList = document.getElementById('messages-list');
        const messageInput = document.getElementById('message-input');
        const chatForm = document.getElementById('chat-form');
        const sendBtn = document.getElementById('send-btn');
        const partnerNameEl = document.getElementById('chat-partner-name');
        const partnerStatusEl = document.getElementById('chat-partner-status');
        const partnerAvatar = document.getElementById('chat-partner-avatar');
        const partnerInitials = document.getElementById('chat-partner-initials');
        const onlineIndicator = document.getElementById('chat-online-indicator');
        const emptyState = document.getElementById('chat-empty-state');
        const typingIndicator = document.getElementById('typing-indicator');
        const typingUserName = document.getElementById('typing-user-name');

        let currentUser = null;
        let targetUserId = null;
        let chatId = null;
        let typingTimeout = null;
        let isTyping = false;

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value.trim().length > 0) {
                sendBtn.disabled = false;
                handleTyping();
            } else {
                sendBtn.disabled = true;
            }
        });

        // Submit on Enter (prevent default to avoid newline unless shift+enter)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if(!sendBtn.disabled) {
                    chatForm.dispatchEvent(new Event('submit'));
                }
            }
        });

        function scrollToBottom() {
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderMessage(msgData, msgId) {
            if(emptyState) emptyState.style.display = 'none';
            
            // Check if message element already exists
            let msgEl = document.getElementById(`msg-${msgId}`);
            if(!msgEl) {
                msgEl = document.createElement('div');
                msgEl.id = `msg-${msgId}`;
                messagesList.appendChild(msgEl);
            }

            const isMine = msgData.senderId === currentUser.uid;
            
            // If I am receiving this, mark it as read
            if(!isMine && !msgData.isRead) {
                update(ref(rtdb, `messages/${chatId}/${msgId}`), { isRead: true });
                // Reset my unread count for this chat
                set(ref(rtdb, `unread/${currentUser.uid}/${chatId}/count`), 0);
            }

            const readReceiptHTML = isMine ? `<span class="material-symbols-outlined text-[12px] ml-1 ${msgData.isRead ? 'text-tertiary-fixed' : 'text-outline-variant'}">done_all</span>` : '';

            msgEl.className = `flex flex-col w-full ${isMine ? 'items-end' : 'items-start'} animate-fade-in`;
            msgEl.innerHTML = `
                <div class="message-bubble px-4 py-2.5 rounded-2xl ${isMine ? 'bg-primary text-white rounded-br-sm' : 'bg-surface-container-high text-on-surface rounded-bl-sm'} shadow-sm">
                    ${msgData.message.replace(/\\n/g, '<br/>')}
                </div>
                <div class="flex items-center gap-1 mt-1 text-[10px] text-on-surface-variant font-label-caps">
                    ${formatTime(msgData.timestamp)}
                    ${readReceiptHTML}
                </div>
            `;
            
            scrollToBottom();
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'sign_in.html';
                return;
            }
            currentUser = user;

            // Get target user ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            targetUserId = urlParams.get('targetUserId');

            if (!targetUserId) {
                alert("No chat partner selected.");
                window.location.href = 'student_dashboard.html';
                return;
            }

            // Generate deterministic Chat ID
            chatId = currentUser.uid < targetUserId ? `${currentUser.uid}_${targetUserId}` : `${targetUserId}_${currentUser.uid}`;

            // Initialize Chat Meta
            update(ref(rtdb, `chats/${chatId}/participants`), {
                [currentUser.uid]: true,
                [targetUserId]: true
            });

            // Set up Online Presence for Current User
            const myConnectionsRef = ref(rtdb, `users/${currentUser.uid}/connections`);
            const lastOnlineRef = ref(rtdb, `users/${currentUser.uid}/lastSeen`);
            const myStatusRef = ref(rtdb, `users/${currentUser.uid}/online`);
            const connectedRef = ref(rtdb, '.info/connected');

            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    const con = push(myConnectionsRef);
                    onDisconnect(con).remove();
                    onDisconnect(myStatusRef).set(false);
                    onDisconnect(lastOnlineRef).set(serverTimestamp());
                    set(myStatusRef, true);
                }
            });

            // Fetch Target User Profile from Firestore
            try {
                const partnerDoc = await getDoc(doc(firestore, 'users', targetUserId));
                if (partnerDoc.exists()) {
                    const pd = partnerDoc.data();
                    const name = pd.displayName || pd.name || 'Student';
                    partnerNameEl.textContent = name;
                    typingUserName.textContent = name.split(' ')[0];
                    
                    if (pd.photoURL) {
                        partnerAvatar.src = pd.photoURL;
                        partnerAvatar.classList.remove('hidden');
                        partnerInitials.classList.add('hidden');
                    } else {
                        partnerInitials.textContent = name.substring(0,2).toUpperCase();
                    }
                } else {
                    partnerNameEl.textContent = 'Student';
                    partnerInitials.textContent = 'ST';
                }
            } catch(e) {
                console.error("Error fetching partner profile", e);
                partnerNameEl.textContent = 'Student';
                partnerInitials.textContent = 'ST';
            }

            // Listen to Target User's Online Status in RTDB
            onValue(ref(rtdb, `users/${targetUserId}/online`), (snap) => {
                const isOnline = snap.val();
                if(isOnline) {
                    onlineIndicator.classList.remove('bg-error');
                    onlineIndicator.classList.add('bg-tertiary-fixed');
                    partnerStatusEl.textContent = 'Online';
                } else {
                    onlineIndicator.classList.remove('bg-tertiary-fixed');
                    onlineIndicator.classList.add('bg-error');
                    partnerStatusEl.textContent = 'Offline';
                }
            });

            // Listen for Messages
            onValue(ref(rtdb, `messages/${chatId}`), (snap) => {
                if(snap.exists()) {
                    messagesList.innerHTML = ''; // clear to re-render in order (can be optimized)
                    snap.forEach((childSnap) => {
                        renderMessage(childSnap.val(), childSnap.key);
                    });
                }
            });

            // Listen for Typing Indicator
            onValue(ref(rtdb, `typing/${chatId}/${targetUserId}/isTyping`), (snap) => {
                if(snap.val() === true) {
                    typingIndicator.classList.remove('opacity-0');
                } else {
                    typingIndicator.classList.add('opacity-0');
                }
            });
            
            // Mark chat as opened (reset unread)
            set(ref(rtdb, `unread/${currentUser.uid}/${chatId}/count`), 0);
        });

        // Typing logic
        function handleTyping() {
            if(!isTyping) {
                isTyping = true;
                set(ref(rtdb, `typing/${chatId}/${currentUser.uid}/isTyping`), true);
            }
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                isTyping = false;
                set(ref(rtdb, `typing/${chatId}/${currentUser.uid}/isTyping`), false);
            }, 2000);
        }

        // Send Message
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if(!text || !currentUser || !chatId) return;

            // Reset input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.disabled = true;

            // Stop typing immediately
            clearTimeout(typingTimeout);
            isTyping = false;
            set(ref(rtdb, `typing/${chatId}/${currentUser.uid}/isTyping`), false);

            const msgData = {
                senderId: currentUser.uid,
                receiverId: targetUserId,
                message: text,
                timestamp: serverTimestamp(),
                isRead: false,
                type: 'text'
            };

            // Push message
            const newMsgRef = push(ref(rtdb, `messages/${chatId}`));
            await set(newMsgRef, msgData);

            // Update chat meta
            const updates = {};
            updates[`chats/${chatId}/lastMessage`] = text;
            updates[`chats/${chatId}/lastMessageTime`] = serverTimestamp();
            await update(ref(rtdb), updates);

            // Increment target's unread count
            const unreadRef = ref(rtdb, `unread/${targetUserId}/${chatId}/count`);
            onValue(unreadRef, (snap) => {
                const currentUnread = snap.val() || 0;
                // only increment once per message send
                // To avoid infinite loops in transaction-like operations, we use a cloud function normally
                // Since this is client-side, we'll just set it blindly to current + 1 (with a small race condition risk)
            }, { onlyOnce: true });
            
            // Using get() from modular SDK
            const snap = await get(ref(rtdb, `unread/${targetUserId}/${chatId}/count`));
            const currentUnread = snap.val() || 0;
            set(ref(rtdb, `unread/${targetUserId}/${chatId}/count`), currentUnread + 1);

        });

    </script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
