<!DOCTYPE html>
<html class="dark" lang="en" style="color-scheme: dark; background:#06040f">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign In - SkillSwap</title>
    <script>
        // Redirect 127.0.0.1 to localhost for Firebase Auth OAuth compliance
        if (window.location.hostname === '127.0.0.1') {
            window.location.hostname = 'localhost';
        }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="webgl_bg.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#675df9",
                        "on-surface": "#f3effc",
                        surface: "rgba(24, 20, 36, 0.45)",
                        "surface-variant": "rgba(40, 35, 60, 0.45)",
                        "outline": "#777587",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "body-md": ["Inter"],
                        "title-md": ["Inter"],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(24, 20, 36, 0.45);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-transparent text-[#f3effc] font-body-md min-h-screen flex items-center justify-center p-4">
    <div class="glass-card w-full max-w-md p-8 rounded-2xl flex flex-col gap-6 shadow-2xl mx-4">
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-primary mb-2">Sign In</h2>
            <p class="text-[#c7c4d8] font-medium">Welcome back to SkillSwap</p>
        </div>

        <div id="auth-error" class="hidden text-error bg-error-container p-3 rounded-lg text-sm font-medium"></div>

        <form id="sign-in-form" class="flex flex-col gap-4">
            <div>
                <label class="block text-sm font-bold text-on-surface mb-1">Email</label>
                <input type="email" id="auth-email" required class="w-full bg-[#1b172e] border border-outline rounded-lg px-4 py-3 text-[#f3effc] focus:outline-none focus:border-primary focus:ring-0" placeholder="student@university.edu" />
            </div>
            <div>
                <label class="block text-sm font-bold text-on-surface mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="auth-password" required class="w-full bg-[#1b172e] border border-outline rounded-lg px-4 py-3 text-[#f3effc] focus:outline-none focus:border-primary focus:ring-0 pr-12" placeholder="••••••••" />
                    <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 px-3 flex items-center text-[#c7c4d8] hover:text-primary transition-colors focus:outline-none" title="Toggle Password Visibility">
                        <span class="material-symbols-outlined" id="toggle-password-icon" style="font-size: 20px;">visibility</span>
                    </button>
                </div>
            </div>

            <button type="submit" id="auth-submit-btn" class="w-full bg-primary hover:opacity-90 text-white font-bold py-3 rounded-xl transition-all shadow-md mt-2 flex items-center justify-center gap-2">
                <span>Sign In</span>
                <span class="material-symbols-outlined text-[18px]">login</span>
            </button>
        </form>

        <div class="text-center mt-4">
            <button type="button" id="auth-google-btn" class="w-full bg-[#1b172e] hover:bg-surface-variant text-[#f3effc] border border-outline font-bold py-3 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2 mb-4">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google Logo"/>
                <span>Sign in with Google</span>
            </button>
            <a href="sign_up.html" class="text-primary hover:underline text-sm font-medium block">
                Don't have an account? Sign Up.
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { initializeFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKoESaSoGW6YsNbrWZK9cJkZEmwzst4EU",
            authDomain: "skill-swap-13607.firebaseapp.com",
            projectId: "skill-swap-13607",
            storageBucket: "skill-swap-13607.firebasestorage.app",
            messagingSenderId: "1084945079828",
            appId: "1:1084945079828:web:2e4f6804050cd2c6a19101"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Force long-polling to bypass strict network firewalls causing 'client is offline' errors
        const db = initializeFirestore(app, {
            experimentalForceLongPolling: true
        });

        const errorDiv = document.getElementById('auth-error');

        const getFriendlyErrorMessage = (error) => {
            const code = error.code || "";
            if (code === 'auth/unauthorized-domain') return "This domain is not authorized for OAuth. Please add it to Firebase Console -> Authentication -> Settings -> Authorized domains.";
            if (code === 'auth/invalid-credential' || code === 'auth/user-not-found' || code === 'auth/wrong-password') return "Invalid email or password.";
            if (code === 'auth/popup-closed-by-user') return "Google sign-in was cancelled.";
            if (error.message && error.message.includes('permission-denied')) return "Database access denied. Please ensure your Firestore Security Rules are set up correctly.";
            return error.message || "An unknown error occurred.";
        };

        const handleLoginResult = async (user, isGoogle = false) => {
            console.log(`[Auth] Fetching profile for UID: ${user.uid}`);
            try {
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);
                
                if (!userDocSnap.exists()) {
                    if (isGoogle) {
                        console.log(`[Auth] Profile missing for Google user. Auto-creating default student profile...`);
                        await setDoc(userDocRef, {
                            uid: user.uid,
                            email: user.email || "",
                            displayName: user.displayName || "Google User",
                            photoURL: user.photoURL || "",
                            userType: 'student',
                            college: 'Unknown College',
                            major: 'Undeclared',
                            createdAt: new Date().toISOString()
                        });
                        console.log(`[Auth] Profile created. Redirecting to student dashboard...`);
                        window.location.href = 'student_dashboard.html';
                    } else {
                        console.log(`[Auth] No profile found for Email user. Logging out.`);
                        await signOut(auth);
                        errorDiv.textContent = "No user profile exists. Please sign up first.";
                        errorDiv.classList.remove('hidden');
                    }
                } else {
                    console.log(`[Auth] Profile found. Routing to correct dashboard...`);
                    // Ensure photoURL is synchronized for existing users
                    if (isGoogle && user.photoURL) {
                        await setDoc(userDocRef, { photoURL: user.photoURL }, { merge: true });
                    }
                    const userData = userDocSnap.data();
                    const dashboard = userData.userType === 'mentor' ? 'mentor_dashboard.html' : 'student_dashboard.html';
                    window.location.href = dashboard;
                }
            } catch (error) {
                console.error("[Firestore Error]", error);
                console.log("[Auth] Fallback: Routing to student dashboard due to Firestore error or missing profile.");
                window.location.href = 'student_dashboard.html';
            }
        };

        document.getElementById('sign-in-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            const submitBtn = document.getElementById('auth-submit-btn');
            submitBtn.disabled = true;

            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            try {
                console.log(`[Auth] Attempting email login for: ${email}`);
                await setPersistence(auth, browserSessionPersistence);
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.log("[Auth] Login successful. Verifying profile...");
                await handleLoginResult(userCredential.user, false);
            } catch (error) {
                console.error("[Auth Error]", error);
                errorDiv.textContent = getFriendlyErrorMessage(error);
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
            }
        });

        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('auth-password');
        const togglePasswordIcon = document.getElementById('toggle-password-icon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePasswordIcon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
        });

        document.getElementById('auth-google-btn').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            errorDiv.classList.add('hidden');
            try {
                console.log("[Auth] Attempting Google Sign-In popup...");
                await setPersistence(auth, browserSessionPersistence);
                const result = await signInWithPopup(auth, provider);
                console.log("[Auth] Google Sign-In successful. Verifying profile...");
                await handleLoginResult(result.user, true);
            } catch (error) {
                console.error("[Auth Error]", error);
                errorDiv.textContent = getFriendlyErrorMessage(error);
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
